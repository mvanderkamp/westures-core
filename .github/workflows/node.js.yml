# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write

    strategy:
      matrix:
        node-version: [22.x, 24.x, 25.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test:coverage
      - name: Validate published package
        shell: bash
        run: |
          pack_file="$(npm pack --silent)"
          temp_dir="$(mktemp -d)"

          cleanup() {
            rm -rf "$temp_dir" "$pack_file"
          }

          trap cleanup EXIT

          (
            cd "$temp_dir"
            npm init -y >/dev/null 2>&1
            npm install "$GITHUB_WORKSPACE/$pack_file" >/dev/null 2>&1
            node -e "const pkg = require('westures-core'); if (!pkg.Region || !pkg.Gesture) { throw new Error('CommonJS package entrypoint is missing exports'); }"
            node --input-type=module -e "const pkg = await import('westures-core'); const api = pkg.default ?? pkg; if (!api.Region || !api.Gesture) { throw new Error('ESM package entrypoint is missing exports'); }"
          )
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel: true
          flag-name: node-${{ matrix.node-version }}

  coveralls-finish:
    needs: build
    runs-on: ubuntu-latest
    if: always()

    permissions:
      checks: write

    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true
